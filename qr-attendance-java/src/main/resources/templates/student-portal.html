<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - QR Attendance</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            padding: 1.5rem;
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 1.25rem;
            box-shadow: var(--card-shadow);
            max-width: 440px;
            width: 100%;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .card-custom:hover {
            transform: translateY(-2px);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            font-weight: 600;
            text-align: center;
            padding: 1.75rem 1.5rem;
            border-bottom: none;
        }

        .form-control-custom {
            border-radius: 0.75rem;
            padding: 0.8rem 1.2rem;
            border: 1px solid #cbd5e1;
            transition: var(--transition-smooth);
            font-size: 1.1rem;
        }

        .form-control-custom:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .btn-primary-custom {
            background: var(--primary-color);
            border: none;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .btn-primary-custom:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-back {
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .alert-custom {
            border-radius: 0.75rem;
            border: none;
            padding: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="w-100" style="max-width: 440px;">
    <div class="mb-3 text-start">
        <a href="/" class="btn btn-outline-secondary btn-back">
            <i class="bi bi-arrow-left me-1"></i> Back to Selector
        </a>
    </div>

    <div class="card card-custom">
        <div class="card-header-custom">
            <h4 class="mb-0 fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>Student Portal</h4>
        </div>
        
        <div class="card-body p-4">
            <p class="text-center text-muted mb-4">Enter your unique Roll Number / ID to view your personal class attendance history and analytics dashboard.</p>

            <!-- Error Notification -->
            <div th:if="${error}" class="alert alert-danger alert-custom d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/student/dashboard}" method="get">
                <div class="mb-4">
                    <label for="rollNumber" class="form-label fw-semibold text-muted">Roll Number</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 0.75rem 0 0 0.75rem; border-color: #cbd5e1;">
                            <i class="bi bi-card-text text-muted"></i>
                        </span>
                        <input type="text" class="form-control form-control-custom border-start-0" style="border-radius: 0 0.75rem 0.75rem 0;" id="rollNumber" name="rollNumber"
                               placeholder="e.g. 101, 102" required autocomplete="off">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-primary-custom w-100 shadow-sm">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Access Dashboard
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
