<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - QR Attendance</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Glassmorphism Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1.5rem;
        }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(to right, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 0.5rem;
            transition: var(--transition-smooth);
        }

        .nav-link-custom:hover {
            color: #f8fafc !important;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Card Revamp */
        .card-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 1.25rem;
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .card-custom:hover {
            transform: translateY(-2px);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            font-weight: 600;
            border-bottom: none;
            padding: 1.2rem 1.5rem;
        }

        /* Back Button */
        .btn-back-custom {
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        /* Buttons & Forms */
        .btn-primary-custom {
            background: var(--primary-color);
            border: none;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 0.75rem;
            transition: var(--transition-smooth);
        }

        .btn-primary-custom:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .form-control-custom {
            border-radius: 0.75rem;
            padding: 0.6rem 1rem;
            border: 1px solid #cbd5e1;
            transition: var(--transition-smooth);
        }

        .form-control-custom:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .alert-custom {
            border-radius: 0.75rem;
            border: none;
        }
    </style>
</head>
<body>

<!-- Navigation Header -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5">
    <div class="container">
        <a class="navbar-brand navbar-brand-custom" href="/">
            <i class="bi bi-qr-code-scan"></i> QR Attendance
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="/admin"><i class="bi bi-calendar-event me-1"></i> Sessions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom active" href="/admin/students"><i class="bi bi-people-fill me-1"></i> Student Directory</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 text-start">
        <div class="col-12 col-md-8 mx-auto">
            <a href="/admin/students" class="btn btn-outline-secondary btn-back-custom">
                <i class="bi bi-arrow-left me-1"></i> Cancel &amp; Back
            </a>
        </div>
    </div>

    <!-- Alert Notifications -->
    <div class="row justify-content-center">
        <div class="col-md-8 mx-auto">
            <div th:if="${success}" class="alert alert-success alert-custom d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="bi bi-check-circle-fill fs-5"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-custom d-flex align-items-center gap-2 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill fs-5"></i>
                <span th:text="${error}"></span>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 mx-auto">
            <div class="card card-custom">
                <div class="card-header card-header-custom d-flex align-items-center gap-2">
                    <i class="bi bi-pencil-square fs-5"></i>
                    <span>Modify Student Records</span>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/students/edit/{id}(id=${student.id})}" th:object="${student}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold text-muted">Full Name</label>
                            <input type="text" id="name" th:field="*{name}" class="form-control form-control-custom" placeholder="e.g. Alice Smith" required>
                        </div>
                        <div class="mb-4">
                            <label for="rollNumber" class="form-label fw-semibold text-muted">Roll Number / Unique ID</label>
                            <input type="text" id="rollNumber" th:field="*{rollNumber}" class="form-control form-control-custom" placeholder="e.g. 101" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-primary-custom w-100 mb-2">
                            <i class="bi bi-check2-circle me-1"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
