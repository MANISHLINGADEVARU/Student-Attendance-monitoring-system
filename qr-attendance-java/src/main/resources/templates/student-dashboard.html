<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - QR Attendance</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --accent-color: #06b6d4;
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #1e293b;
        }

        /* Glassmorphism Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1.5rem;
        }

        .navbar-brand-custom {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(to right, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link-custom {
            color: #94a3b8 !important;
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 0.5rem;
            transition: var(--transition-smooth);
        }

        .nav-link-custom:hover {
            color: #f8fafc !important;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Card Revamp */
        .card-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 1.25rem;
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .card-custom:hover {
            transform: translateY(-2px);
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffffff;
            font-weight: 600;
            border-bottom: none;
            padding: 1.2rem 1.5rem;
        }

        /* Back Button */
        .btn-back-custom {
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        /* Tables */
        .table-custom {
            border-radius: 0.75rem;
            overflow: hidden;
            border-collapse: separate;
            border-spacing: 0;
        }

        .table-custom thead {
            background: #1e293b;
            color: #ffffff;
        }

        .table-custom th {
            padding: 1rem;
            font-weight: 600;
            border-bottom: none;
        }

        .table-custom td {
            padding: 1rem;
            vertical-align: middle;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .table-custom tr:last-child td {
            border-bottom: none;
        }

        /* Profile Box */
        .profile-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            color: white;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        .stat-value {
            font-size: 2.75rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
        }
    </style>
</head>
<body>

<!-- Navigation Header -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-5">
    <div class="container">
        <a class="navbar-brand navbar-brand-custom" href="/">
            <i class="bi bi-qr-code-scan"></i> QR Attendance
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" href="/student"><i class="bi bi-door-open-fill me-1"></i> Exit Portal</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <a href="/student" class="btn btn-outline-secondary btn-back-custom">
                <i class="bi bi-arrow-left me-1"></i> Back to Student Entry
            </a>
        </div>
    </div>

    <div class="row g-4">
        <!-- Student Profile Box -->
        <div class="col-lg-4">
            <div class="card card-custom p-4 text-center h-100 d-flex flex-column justify-content-between">
                <div class="d-flex flex-column align-items-center">
                    <div class="profile-avatar" th:text="${student.name.substring(0, 1).toUpperCase()}">S</div>
                    <h3 class="fw-bold mb-1" style="color: #0f172a;" th:text="${student.name}">Student Name</h3>
                    <p class="text-secondary mb-3"><span class="badge bg-secondary px-3 py-2 fw-semibold" th:text="${'Roll No: ' + student.rollNumber}">Roll No</span></p>
                </div>
                
                <div class="border-top pt-4 mt-3">
                    <div class="stat-value mb-2" th:text="${attendanceCount}">0</div>
                    <div class="text-uppercase small fw-bold text-muted tracking-wider">Total Lectures Attended</div>
                </div>
            </div>
        </div>

        <!-- Attendance Logs Table -->
        <div class="col-lg-8">
            <div class="card card-custom h-100">
                <div class="card-header card-header-custom d-flex justify-content-between align-items-center">
                    <span class="d-flex align-items-center gap-2">
                        <i class="bi bi-clock-history"></i> Your Attendance Log History
                    </span>
                    <span class="badge bg-light text-dark rounded-pill fw-semibold" th:text="${attendanceCount + ' Lectures'}"></span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>Subject / Lecture Name</th>
                                    <th>Session Date</th>
                                    <th>Marked Timestamp</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${records.isEmpty()}">
                                    <td colspan="3" class="text-center py-5 text-muted">
                                        <i class="bi bi-folder-x fs-1 d-block mb-2"></i>
                                        No registered attendance records found in the database. Scan a QR code to start logging!
                                    </td>
                                </tr>
                                <tr th:each="record : ${records}">
                                    <td class="fw-semibold text-dark" th:text="${record.session.subject}"></td>
                                    <td class="text-secondary" th:text="${record.session.sessionDate.toString().replace('T', ' ').substring(0, 16)}"></td>
                                    <td class="text-muted fw-semibold">
                                        <i class="bi bi-check2-all text-success me-1"></i>
                                        <span th:text="${record.markedAt.toString().replace('T', ' ').substring(11, 19)}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
